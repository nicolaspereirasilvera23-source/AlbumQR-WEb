<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qrly · Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <a href="/" class="corner-logo">
    <img src="QRLY.png" alt="QRLY logo" />
  </a>

  <div class="wr">
    <div class="brand">
      <h1>QRLY</h1>
      <p>Capturando momentos desde el inicio</p>
    </div>

    <div class="card">
      <div class="accent-bar"></div>

      <div class="tabs">
        <button class="tab active" type="button" data-tab="login">Ingresar</button>
        <button class="tab" type="button" data-tab="register">Crear cuenta</button>
      </div>

      <form id="login-form" class="form-section active">
        <div class="field">
          <label for="login-email">Correo electrónico</label>
          <input id="login-email" name="email" type="email" placeholder="tu@correo.com" required />
        </div>

        <div class="field">
          <label for="login-password">Contraseña</label>
          <input id="login-password" name="password" type="password" placeholder="••••••••" required />
        </div>

        <button class="btn-primary" type="submit">Ingresar</button>
      </form>

      <form id="register-form" class="form-section">
        <div class="field">
          <label for="register-email">Correo electrónico</label>
          <input id="register-email" name="email" type="email" placeholder="tu@correo.com" required />
        </div>

        <div class="field">
          <label for="register-password">Contraseña</label>
          <input id="register-password" name="password" type="password" placeholder="Mínimo 8 caracteres" required minlength="8" />
        </div>

        <button class="btn-primary" type="submit">Crear cuenta gratis</button>
      </form>

      <div class="help-text" id="help-text"></div>

      <div class="auth-message" id="auth-message"></div>

      <div class="steps">
        <div class="step"><div class="step-num">1</div><div class="step-text">Registrate como anfitrión</div></div>
        <div class="step"><div class="step-num">2</div><div class="step-text">Creá el álbum y obtenés un QR único</div></div>
        <div class="step"><div class="step-num">3</div><div class="step-text">Tus invitados escanean y suben fotos</div></div>
      </div>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
